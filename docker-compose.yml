services:
  postgres:
    image: postgres:16
    container_name: geni_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-geni}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geni_password}
      POSTGRES_DB: ${POSTGRES_DB:-geni}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - geni_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geni} -d ${POSTGRES_DB:-geni}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  geni_postgres_data:
